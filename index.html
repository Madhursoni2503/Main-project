<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juice Landing Page</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>


    <div class="container" id="mainBg">
        <div class="content">
            <h1 id="title">Orange Juice</h1>
            <p id="description">Freshly squeezed organic oranges, packed with Vitamin C and natural energy.</p>
          <a href="order.html"><button id="btn">ORDER NOW</button></a> 
        </div>

        <div class="wheel-container">
            <div class="wheel" id="wheel">
                <div class="bottle item-0">
                    <img src="Images/Strawberry-removebg-preview.webp" alt="Orange" onerror="this.src='https://via.placeholder.com/200x500/FFA500/FFFFFF?text=Orange+Bottle'">
                </div>
                <div class="bottle item-1">
                    <img src="Images/grape-removebg-preview.webp" alt="Berry" onerror="this.src='https://via.placeholder.com/200x500/FF0000/FFFFFF?text=Berry+Bottle'">
                </div>
                <div class="bottle item-2">
                    <img src="Images/Cherry-removebg-preview.webp" alt="Kiwi" onerror="this.src='https://via.placeholder.com/200x500/00FF00/FFFFFF?text=Kiwi+Bottle'">
                </div>
                <div class="bottle item-3">
                    <img src="Images/Orange-removebg-preview.webp" alt="Grape" onerror="this.src='https://via.placeholder.com/200x500/800080/FFFFFF?text=Grape+Bottle'" >
                </div>
            </div>
        </div>
       

    <div class="thumbnails">
            <img src="Images/Orange-removebg-preview.webp" class="thumb active" data-index="0" onerror="this.style.background='#FFA500'">
            <img src="Images/Strawberry-removebg-preview.webp" class="thumb" data-index="1" onerror="this.style.background='#FF4747'">
            <img src="Images/grape-removebg-preview.webp" class="thumb" data-index="2" onerror="this.style.background='#2ECC71'">
            <img src="Images/Cherry-removebg-preview.webp" class="thumb" data-index="3" onerror="this.style.background='#9B59B6'">
        </div>
    </div>


    <script src="JAVASCRIPT/script.js"></script>
</body>
</html>
